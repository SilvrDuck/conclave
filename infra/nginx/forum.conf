server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* and /stream to the observer, so the bundled SPA's
    # relative-URL fetcher (default `import.meta.env.VITE_OBSERVER_URL`
    # → `/api`) works without baking a host-specific URL into the build.
    location /api/ {
        proxy_pass http://observer:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # SSE needs unbuffered streaming.
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 24h;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # SPA caching: hash-stamped chunks immutable, html short-lived.
    location ~* \.(js|css|woff2?|ttf|otf|png|jpg|svg|webp)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
