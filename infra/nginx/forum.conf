server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # SPA caching: hash-stamped chunks immutable, html short-lived.
    location ~* \.(js|css|woff2?|ttf|otf|png|jpg|svg|webp)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
