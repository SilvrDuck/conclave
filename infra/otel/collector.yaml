receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 256

exporters:
  otlphttp/tempo:
    endpoint: http://tempo:4318
    tls:
      insecure: true
  otlphttp/observer:
    # Observer ingests a small projection for the live call-graph; Tempo is
    # the source of truth for full queries. Path matches the observer's
    # POST /ingest/otel handler (see spec/07-c4.md Observer component view).
    endpoint: http://observer:8000/ingest/otel
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/tempo, otlphttp/observer]
  telemetry:
    logs:
      level: info
