receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 256

exporters:
  otlphttp/tempo:
    endpoint: http://tempo:4318
    tls:
      insecure: true
  otlphttp/observer:
    # Observer ingests a small projection for the live call-graph; Tempo is
    # the source of truth for full queries. The OTel exporter appends
    # `/v1/traces` to the endpoint base — observer accepts JSON OTLP at
    # that path (see services/observer/src/observer/api/ingest.py).
    endpoint: http://observer:8000/ingest/otel
    encoding: json
    compression: none
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/tempo, otlphttp/observer]
  telemetry:
    logs:
      level: info
